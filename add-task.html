<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow - Add Task</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="add-task.html">Add Task</a>
    <a href="task-list.html">Task List</a>
    <a href="task-detail.html">Task Detail</a>
    <a href="about.html">About</a>
  </nav>
  <div class="container">
    <h1>Add New Task</h1>
    <form>
      <label>Task Title</label>
      <input type="text" placeholder="Enter task title">
      <label>Description</label>
      <textarea rows="4" placeholder="Enter task description"></textarea>
      <label>Due Date</label>
      <input type="date">
      <label>Priority</label>
      <select>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>
      <br><br>
      <button class="btn" type="submit">Add Task</button>
      <a href="index.html" class="btn btn-danger">Cancel</a>
    </form>
  </div>
</body>
</html>
